name: Arch Linux CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    
    steps:
    - name: Update system
      run: |
        pacman -Syu --noconfirm
        pacman -S --needed --noconfirm base-devel git
    
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        pacman -S --needed --noconfirm \
          rust \
          cargo \
          pkg-config \
          gtk3 \
          glib2 \
          llvm \
          clang \
          python
    
    - name: Build compiler
      run: |
        cd compiler
        cargo build --release
        cargo test --release
    
    - name: Build REPL
      run: |
        cd tools/m5repl
        cargo build --release
    
    - name: Build IDE
      run: |
        cd tools/m5idle
        cargo build --release
    
    - name: Build formatter
      run: |
        rustc --edition 2021 -O tools/m5fmt.rs -o target/release/m5fmt
    
    - name: Build linter
      run: |
        rustc --edition 2021 -O tools/m5lint.rs -o target/release/m5lint
    
    - name: Build LSP
      run: |
        cd tools/lsp
        cargo build --release
    
    - name: Run integration tests
      run: |
        ./tools/m5repl/target/release/m5repl packages/hello_world.m5
    
    - name: Build package
      run: |
        cd arch
        makepkg --noconfirm
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: m5rcode-arch-package
        path: arch/*.pkg.tar.zst

  test:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    
    steps:
    - name: Update system
      run: pacman -Syu --noconfirm
    
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install Rust
      run: |
        pacman -S --needed --noconfirm rust cargo
    
    - name: Run unit tests
      run: |
        cd compiler
        cargo test --verbose
    
    - name: Run runtime tests
      run: |
        cd runtime
        cargo test --verbose

  lint:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    
    steps:
    - name: Update system
      run: pacman -Syu --noconfirm
    
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install Rust
      run: |
        pacman -S --needed --noconfirm rust cargo
    
    - name: Run clippy
      run: |
        cd compiler
        cargo clippy -- -D warnings
    
    - name: Check formatting
      run: |
        cd compiler
        cargo fmt -- --check
